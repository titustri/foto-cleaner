name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Backup custom AndroidManifest
        run: cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest_custom.xml

      - name: Generate missing Android boilerplate (fix v1 embedding)
        run: |
          flutter create \
            --org com.example \
            --project-name foto_cleaner \
            --platforms android \
            .

      - name: Restore custom AndroidManifest
        run: cp /tmp/AndroidManifest_custom.xml android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: foto-cleaner-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
